# ===================================================================
# MS-Recursos y Colaboraciones - Configuración
# ===================================================================

spring:
  application:
    name: ms-recursos-colaboraciones

  # --- DataSource (PostgreSQL vía Amazon RDS) ---
  datasource:
    url: jdbc:postgresql://localhost:5432/innovatech_recursos
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariPool-Recursos
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 20000

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# --- Puerto del servidor ---
server:
  port: 8083

# --- Logging ---
logging:
  level:
    Innovatech.ms_recursos_colaboraciones: DEBUG
    org.hibernate.SQL: DEBUG
