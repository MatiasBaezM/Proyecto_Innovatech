# ==============================================================================
# Kubernetes Service - MS Gestión de Proyectos (Amazon EKS)
# ==============================================================================

apiVersion: v1
kind: Service
metadata:
  name: ms-gestion-proyectos-service
  namespace: innovatech
  labels:
    app: ms-gestion-proyectos
spec:
  type: ClusterIP
  selector:
    app: ms-gestion-proyectos
  ports:
    - name: http
      protocol: TCP
      port: 8082
      targetPort: 8082

---

