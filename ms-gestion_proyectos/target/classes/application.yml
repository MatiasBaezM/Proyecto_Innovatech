# ===================================================================
# MS-Gestión de Proyectos - Configuración
# ===================================================================

spring:
  application:
    name: ms-gestion-proyectos

  # --- DataSource (PostgreSQL vía Amazon RDS) ---
  datasource:
    url: jdbc:postgresql://localhost:5432/innovatech_proyectos
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

    # --- HikariCP Connection Pool ---
    hikari:
      pool-name: HikariPool-Proyectos
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000        # 5 minutos
      max-lifetime: 600000        # 10 minutos
      connection-timeout: 20000   # 20 segundos
      leak-detection-threshold: 60000

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# --- Puerto del servidor ---
server:
  port: 8082

# --- Logging ---
logging:
  level:
    Innovatech.ms_gestion_proyectos: DEBUG
    org.hibernate.SQL: DEBUG
