# ===================================================================
# MS-Autenticación - Configuración
# ===================================================================

spring:
  application:
    name: ms-autenticacion

  # --- DataSource (PostgreSQL vía Amazon RDS) ---
  datasource:
    url: jdbc:postgresql://localhost:5432/innovatech_auth
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariPool-Auth
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 20000

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# --- Puerto del servidor ---
server:
  port: 8081

# --- JWT ---
jwt:
  secret: dGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JJbm5vdmF0ZWNoUHJvamVjdDIwMjY=
  expiration: 86400000  # 24 horas en milisegundos

# --- Logging ---
logging:
  level:
    Innovatech.ms_autenticacion: DEBUG
    org.springframework.security: DEBUG
